<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scaredy Cat</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🙀</span>
        <h1 class="logo-text">Scaredy Cat</h1>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="enableToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </header>

    <!-- Status -->
    <div class="status-section">
      <div class="status-card" id="statusCard">
        <div class="status-icon">🛡️</div>
        <div class="status-info">
          <span class="status-count" id="blockedCount">0</span>
          <span class="status-label">items hidden on this page</span>
        </div>
      </div>
    </div>

    <!-- Sensitivity Control -->
    <div class="control-section">
      <label class="control-label">
        <span class="control-title">Sensitivity</span>
        <span class="control-value" id="sensitivityValue">Medium</span>
      </label>
      <div class="sensitivity-buttons">
        <button class="sensitivity-btn" data-value="low">
          <span class="btn-icon">😌</span>
          <span class="btn-label">Low</span>
        </button>
        <button class="sensitivity-btn active" data-value="medium">
          <span class="btn-icon">😟</span>
          <span class="btn-label">Medium</span>
        </button>
        <button class="sensitivity-btn" data-value="high">
          <span class="btn-icon">😱</span>
          <span class="btn-label">High</span>
        </button>
      </div>
      <p class="control-hint" id="sensitivityHint">Blocks content with 60%+ horror confidence</p>
    </div>

    <!-- Site Controls -->
    <div class="control-section">
      <button class="action-btn site-toggle" id="siteToggle">
        <span class="action-icon">🌐</span>
        <span class="action-text">Disable on this site</span>
      </button>
    </div>

    <!-- Blocked Items (if any) -->
    <div class="blocked-section" id="blockedSection" style="display: none;">
      <div class="section-header">
        <span class="section-title">Hidden Items</span>
        <button class="show-all-btn" id="showAllBtn">Show all</button>
      </div>
      <ul class="blocked-list" id="blockedList">
        <!-- Dynamically populated -->
      </ul>
    </div>

    <!-- Stats -->
    <div class="stats-section">
      <div class="stat-item">
        <span class="stat-icon">📊</span>
        <span class="stat-text">Total blocked: <strong id="totalBlocked">0</strong></span>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p class="footer-text">Keeping you safe from spooky stuff! 👻</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
